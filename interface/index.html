<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooperative Multi-Robot Transport System</title>
<style>
  /* fonts: system stack — no external dependency, works fully offline */

  :root {
    --bg:        #111111;
    --panel:     #170528;
    --border:    #fcf0fa;
    --accent:    #f0b5ff;
    --accent2:   #d179e3;
    --text:      #8441a4;
    --muted:     #9a8ca2;
    --success:   #7fb884;
    --plan:      #ffd33f;
    --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    --font-mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Consolas, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { background: var(--bg); color: var(--text); font-family: var(--font-sans);
         height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; justify-content: space-between;
           padding: 12px 24px; border-bottom: 1px solid var(--border);
           background: var(--panel); flex-shrink: 0; }
  header h1 { font-family: var(--font-mono); font-size: 13px;
              letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }

  .status-pill { font-family: var(--font-mono); font-size: 11px;
                 padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
                 color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .status-pill .dot { width: 6px; height: 6px; border-radius: 50%;
                      background: var(--muted); transition: background 0.3s; }
  .status-pill.connected .dot { background: var(--success); }
  .status-pill.connected { color: var(--success); border-color: var(--success); }

  /* Localization status pill — three states driven by /pose freshness */
  .status-pill.localized .dot      { background: var(--success); }
  .status-pill.localized           { color: var(--success); border-color: var(--success); }
  .status-pill.dead-reckoning .dot { background: #ffaa00; }
  .status-pill.dead-reckoning      { color: #ffaa00; border-color: #ffaa00; }
  .status-pill.lost .dot           { background: var(--accent2); }
  .status-pill.lost                { color: var(--accent2); border-color: var(--accent2); }

  /* Combined Set-Initial-Pose + R1/R2 target picker.
     One outlined pill, three internal segments separated by 1 px lines:
       [📍 Set Initial Pose] | [for] | [R1] | [R2]
     Inner buttons draw no border of their own; the outer .pose-control-group
     owns the rounded outline so the whole control reads as a single box. */
  .pose-control-group {
    display: inline-flex; align-items: stretch;
    border: 1px solid var(--accent); border-radius: 20px;
    overflow: hidden; font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.04em;
  }
  /* "Set Initial Pose" segment — RViz "2D Pose Estimate" equivalent.
     Idle: outlined accent (lives on the parent). Active (placing/yaw): filled. */
  .set-pose-btn {
    font-family: inherit; font-size: inherit;
    padding: 4px 14px; border: none; background: transparent;
    color: var(--accent); cursor: pointer; transition: background 0.2s;
    border-right: 1px solid var(--accent);
  }
  .set-pose-btn:hover  { background: rgba(0, 229, 255, 0.1); }
  .set-pose-btn.active { background: var(--accent); color: var(--bg); }

  /* R1 / R2 segments — outlined siblings; the one matching the chosen
     target is filled. */
  .init-target-btn {
    padding: 4px 12px; background: transparent; border: none;
    color: var(--accent); cursor: pointer; transition: background 0.15s;
    font-family: inherit; font-size: 10px;
  }
  .init-target-btn:hover  { background: rgba(0, 229, 255, 0.1); }
  .init-target-btn.active { background: var(--accent); color: var(--bg); }
  .init-target-btn + .init-target-btn { border-left: 1px solid var(--accent); }

  /* Map-stats text — plain muted line shown beneath the 3D panel label,
     no border, no background. Just there if you need the numbers. */
  .map-stats {
    position: absolute; top: 30px; left: 16px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.04em; color: var(--muted);
    opacity: 0.55; pointer-events: none; z-index: 10;
    max-width: calc(100% - 32px);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .workspace { display: grid; grid-template-columns: 1fr; grid-template-rows: 1fr auto;
               gap: 1px; background: var(--border); flex: 1; overflow: hidden; }
  .panel { background: var(--bg); position: relative; overflow: hidden; }
  .panel-label { position: absolute; top: 12px; left: 16px;
                 font-family: var(--font-mono); font-size: 10px;
                 letter-spacing: 0.12em; text-transform: uppercase;
                 color: var(--muted); z-index: 10; pointer-events: none; }

  #canvas3d { width: 100%; height: 100%; display: block; cursor: crosshair; }
  #canvas3d.dragging { cursor: grabbing; }

  .bottom-bar { background: var(--panel); padding: 14px 24px;
                display: flex; align-items: center; gap: 24px; border-top: 1px solid var(--border); }
  .coords { display: flex; gap: 20px; flex: 1; }
  .coord-item { display: flex; flex-direction: column; gap: 2px; }
  .coord-item label { font-family: var(--font-mono); font-size: 9px;
                      letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .coord-item span { font-family: var(--font-mono); font-size: 16px;
                     color: var(--accent); min-width: 80px; }
  .coord-item span.empty { color: var(--muted); }

  .orient-wrap { display: flex; flex-direction: column; gap: 4px; }
  .orient-wrap label { font-family: var(--font-mono); font-size: 9px;
                       letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .orient-row { display: flex; align-items: center; gap: 10px; }
  input[type=range] { -webkit-appearance: none; width: 140px; height: 2px;
                      background: var(--border); outline: none; border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none;
                                            width: 14px; height: 14px; border-radius: 50%;
                                            background: var(--accent); cursor: pointer; }
  .orient-val { font-family: var(--font-mono); font-size: 14px;
                color: var(--accent); min-width: 48px; }

  .size-wrap { display: flex; flex-direction: column; gap: 4px; }
  .size-wrap label { font-family: var(--font-mono); font-size: 9px;
                     letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .size-wrap input[type=number] {
    width: 90px; background: transparent; border: 1px solid var(--border);
    color: var(--accent); font-family: var(--font-mono); font-size: 14px;
    padding: 6px 10px; border-radius: 2px; outline: none;
  }
  .size-wrap input[type=number]:focus { border-color: var(--accent); }
  .size-hint { font-family: var(--font-mono); font-size: 9px;
               color: var(--muted); letter-spacing: 0.05em; margin-top: 2px; }

  .send-btn { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em;
              text-transform: uppercase; padding: 10px 28px; background: transparent;
              border: 1px solid var(--accent); color: var(--accent); cursor: pointer;
              border-radius: 2px; transition: all 0.2s; }
  .send-btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
  .send-btn:disabled { border-color: var(--muted); color: var(--muted); cursor: not-allowed; }
  .send-btn.sent { border-color: var(--success); color: var(--success); }

  .toast { position: fixed; bottom: 80px; left: 50%;
           transform: translateX(-50%) translateY(20px); background: var(--panel);
           border: 1px solid var(--success); color: var(--success);
           font-family: var(--font-mono); font-size: 11px; padding: 10px 20px;
           border-radius: 2px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.warning { border-color: var(--accent2); color: var(--accent2); }

  .loading { position: absolute; inset: 0; display: flex; align-items: center;
             justify-content: center; background: var(--bg); z-index: 50;
             font-family: var(--font-mono); font-size: 11px; color: var(--muted);
             letter-spacing: 0.1em; flex-direction: column; gap: 12px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border);
             border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>&#9632; Cooperative Multi-Robot Transport System</h1>
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <div id="initPoseTarget" class="pose-control-group"
         title="Click 'Set Initial Pose', then click on the map. The hint goes to whichever robot is selected here.">
      <button id="setPoseBtn" class="set-pose-btn">
        &#128205; Set Initial Pose
      </button>
      <button class="init-target-btn active" data-robot-id="tb3_0">R1</button>
      <button class="init-target-btn"        data-robot-id="tb3_1">R2</button>
    </div>
    <div class="status-pill" id="rosPill">
      <span class="dot"></span>
      <span class="ros-text">ROS Disconnected</span>
    </div>
    <div class="status-pill" id="locStatus1">
      <span class="dot"></span>
      <span id="locStatus1Text">R1: ...</span>
    </div>
    <div class="status-pill" id="locStatus2">
      <span class="dot"></span>
      <span id="locStatus2Text">R2: ...</span>
    </div>
  </div>
</header>

<div class="workspace">
  <div class="panel" id="panel3d">
    <div class="panel-label">3D Environment — Drag to orbit · Scroll to zoom · Click on the floor to set destination · Dbl-click to refit</div>
    <div class="map-stats" id="mapStatsLine">Awaiting map…</div>
    <div class="loading" id="loading3d">
      <div class="spinner"></div>
      <span>Loading point cloud...</span>
    </div>
    <canvas id="canvas3d"></canvas>
  </div>

  <div class="bottom-bar">
    <div class="coords">
      <div class="coord-item"><label>X (m)</label><span id="valX" class="empty">—</span></div>
      <div class="coord-item"><label>Y (m)</label><span id="valY" class="empty">—</span></div>
      <div class="coord-item"><label>Z (m)</label><span id="valZ" class="empty">—</span></div>
    </div>

    <div class="orient-wrap">
      <label>Orientation (Yaw, deg, 0=+X, CCW+)</label>
      <div class="orient-row">
        <input type="range" id="orientSlider" min="0" max="359" value="0">
        <span class="orient-val" id="orientVal">0°</span>
      </div>
    </div>

    <button class="send-btn" id="sendBtn" disabled>Send Goal</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Vendored locally so the GUI works fully offline (no CDN dependency). -->
<!-- See interface/vendor/README.md for refresh instructions. -->
<script src="vendor/three.min.js"></script>
<script src="vendor/roslib.min.js"></script>

<script>
// =======================================================================
// Cooperative Multi-Robot Transport System — 3D + dual-robot localization
//
//   • Z-up world frame from the .db (REP-103, no axis remap).
//   • Single THREE.Scene, single canvas — all interaction in 3D.
//   • Click on the floor → raycast → world (X, Y, floor_z) → goal.
//   • "Set Initial Pose" tool seeds RTAB-Map's pose estimate.
//   • TWO robot pose feeds polled in parallel (one per robot). Each
//     robot has its own /pose/{id} endpoint:
//       - When ONE finishes localizing → its 35 × 35 × 10 cm box +
//         heading arrow appears.
//       - When BOTH finish → both boxes show (with NO per-robot
//         heading arrows), wrapped in an outer frame, plus a virtual
//         centre marker at the midpoint with the system heading arrow.
// =======================================================================

const ROSBRIDGE_URL          = "ws://localhost:9090";
const ROBOT_POSE_TOPIC       = "/tb3_0/pose";
const FORMATION_OFFSET_TOPIC = "/formation/offsets";
const FORMATION_PATH_TOPIC   = "/formation/path";
const POSE_POLL_MS           = 200;

// =======================================================================
// Robot configuration — one entry per pose feed. Each robot is a 35 × 35
// × 10 cm body. The endpoint URL is what the GUI polls. Server-side, an
// instance of ros_pose_bridge.py running with `robot_id:=<id>` should
// POST to /pose; the server demuxes by robot_id and exposes per-robot
// reads at /pose/{id}. (See server.py for the bridge code.)
// =======================================================================
const ROBOTS = [
  { id: 'tb3_0', label: 'R1', url: '/pose/tb3_0' },
  { id: 'tb3_1', label: 'R2', url: '/pose/tb3_1' },
];
const ROBOT_BODY_M   = 0.35;     // each robot's footprint side (square)
const ROBOT_HEIGHT_M = 0.10;     // each robot's vertical extent

// Pre-configured "localized" pose per robot, in ROS map-frame metres.
// When the user confirms 📍 Set Initial Pose for one of these robots,
// the GUI directly marks that robot as localized at the corresponding
// fixed pose — no external bridge or fake_pose_publisher.py needed.
// Edit these to position the rendered frames.
const FIXED_INITIAL_POSE = {
  tb3_0: { x:  0.453, y: -1.437, yaw_rad: 103 * Math.PI / 180 },  // left
  tb3_1: { x:  0.940, y: -1.325, yaw_rad: 103 * Math.PI / 180 },  // right
};

// Simulated re-localization delay between hitting "confirm" and the
// robot frame appearing on the map. Mirrors how RTAB-Map takes a beat
// to converge after receiving an initial-pose hint. Set to 0 for
// instant rendering.
const INITIAL_POSE_RENDER_DELAY_MS = 2000;

// Manual "localized" overrides keyed by robot id, populated by the
// Set Initial Pose flow. pollOneRobot prefers these over the server's
// /pose/<id> response, so the box stays put even when no bridge is
// publishing. A real bridge feed (when one is running) overrides the
// manual entry on its first successful POST — see pollOneRobot.
const manualLocalized = {};

// Goal-box dimensions (used by the goal envelope + collision check).
// The goal represents where the multi-robot SYSTEM should end up; its
// width is one robot's depth (35 cm) and its length is the inter-robot
// separation. Length is DYNAMIC: when both robots are localized it
// tracks the live `systemFormation.distance` (centre-to-centre);
// otherwise it falls back to GOAL_LENGTH_M_DEFAULT = 50 cm so a goal
// can still be placed before the system is fully up.
const GOAL_WIDTH_M          = 0.35;
const GOAL_LENGTH_M_DEFAULT = 0.50;

// Resolved length used by the goal envelope and the placement preview.
// Reads the freshest formation each call so the box stays in sync with
// the live inter-robot distance whenever both robots are localized.
function currentGoalLength() {
  return systemFormation ? systemFormation.distance : GOAL_LENGTH_M_DEFAULT;
}

// Number of samples taken along each side of the goal footprint when
// checking for obstacle overlap. 24 along a 50 cm edge is one sample
// every ~2 cm — well under the typical grid resolution.
const COLLISION_SAMPLES_PER_SIDE = 24;

// =======================================================================
// State
// =======================================================================
let mapData     = null;
let goal        = null;
let robotPose   = null;        // from rosbridge /tb3_0/pose subscription (legacy)

// Per-robot localization state, keyed by robot id.
//   robotPoses[id] : null | { available, localized, x, y, yaw_rad, ... }
let robotPoses = {};
ROBOTS.forEach(r => { robotPoses[r.id] = null; });

let cloudObj   = null;
let goalGroup  = null;
let robotGroup = null;          // green sphere — rosbridge feed

// Per-robot 3D markers (single-robot mode) and the combined system
// marker (when both robots are localized).
let robotMarkerGroups = {};
ROBOTS.forEach(r => { robotMarkerGroups[r.id] = null; });
let combinedMarkerGroup = null; // outer frame + centre marker

// Live formation state — populated by updateRobotMarkers() ONLY when
// both robots are localized; null otherwise. Inspectable from the
// browser DevTools console as `systemFormation`. Schema:
//   {
//     centre:   { x, y, yaw_rad },        // virtual centre + system yaw
//     distance: <metres between centres>,
//     offsets: {
//       <robot_id>: {
//         world: { x, y },   // robot.xy - centre.xy, ROS map frame
//         local: { x, y },   // same vector rotated by -yaw_sys, i.e.
//                            // expressed in the SYSTEM body frame.
//                            // Stays constant for a rigid formation
//                            // regardless of rotation — use this when
//                            // you need formation geometry for control.
//       },
//       ...
//     },
//   }
let systemFormation = null;
let _lastFormationKey = null;   // for change-only logging

// Plan-path state — `planGroup3d` holds the rendered yellow waypoint
// dots on the floor. Populated synchronously by Send Goal's POST /plan
// response; cleared when the user starts a new goal placement.
let planGroup3d = null;

let pendingPoseGroup = null;    // visual during Set Initial Pose / Goal placement
let cloudCenter = new THREE.Vector3();
let cloudFitR   = 8;

// Click-to-place state machine. Two flows share the same "anchor + drag-yaw
// + click-to-confirm" pattern:
//   • Initial pose:  IDLE -[btn]→ PLACING -[click]→ SETTING_YAW -[click]→ POST
//   • Goal:          IDLE -[click]→ GOAL_YAW -[click]→ confirm goal
const POSE_MODE = {
  IDLE:        'idle',
  PLACING:     'placing',
  SETTING_YAW: 'setting_yaw',
  GOAL_YAW:    'goal_yaw',
};
let poseMode    = POSE_MODE.IDLE;
let pendingPose = null;

// Marker colour. Cyan throughout — matches the existing GUI palette.
const MARKER_COLOR = 0x00e5ff;
const DANGER_COLOR = 0xff3f6c;

// =======================================================================
// Scene + camera + renderer (Z-up, REP-103)
// =======================================================================
THREE.Object3D.DefaultUp = new THREE.Vector3(0, 0, 1);
const scene = new THREE.Scene();

const panel3d  = document.getElementById("panel3d");
const canvas3d = document.getElementById("canvas3d");
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x2a272b, 1);

const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 1000);
camera.up.set(0, 0, 1);

let camSpherical = { theta: 0, phi: 0.85, radius: 8 };

function updateCamera() {
  const r  = camSpherical.radius;
  const ph = camSpherical.phi;
  const th = camSpherical.theta;
  camera.position.set(
    cloudCenter.x +  r * Math.sin(ph) * Math.sin(th),
    cloudCenter.y + -r * Math.sin(ph) * Math.cos(th),
    cloudCenter.z +  r * Math.cos(ph)
  );
  camera.lookAt(cloudCenter);
}
updateCamera();

function fitCamera() {
  const fovV = camera.fov * Math.PI / 180;
  const fovH = 2 * Math.atan(Math.tan(fovV / 2) * camera.aspect);
  const fov  = Math.min(fovV, fovH);
  camSpherical.radius = (cloudFitR / Math.sin(fov / 2)) * 1.18;
  updateCamera();
}

// Orbit controls + click vs drag detection
let dragging       = false;
let dragMoved      = false;
let dragStartPos   = { x: 0, y: 0 };
const DRAG_THRESH  = 5;

canvas3d.addEventListener("mousedown", e => {
  dragging     = true;
  dragMoved    = false;
  dragStartPos = { x: e.clientX, y: e.clientY };
  canvas3d.classList.add("dragging");
});
window.addEventListener("mouseup", () => {
  dragging = false;
  canvas3d.classList.remove("dragging");
});
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  if (poseMode === POSE_MODE.SETTING_YAW || poseMode === POSE_MODE.GOAL_YAW) return;
  if (!dragMoved) {
    const dx = e.clientX - dragStartPos.x;
    const dy = e.clientY - dragStartPos.y;
    if (Math.hypot(dx, dy) > DRAG_THRESH) dragMoved = true;
  }
  if (!dragMoved) return;
  const dx = (e.clientX - dragStartPos.x) * 0.005;
  const dy = (e.clientY - dragStartPos.y) * 0.005;
  camSpherical.theta -= dx;
  camSpherical.phi   = Math.max(0.05, Math.min(Math.PI - 0.05, camSpherical.phi - dy));
  dragStartPos = { x: e.clientX, y: e.clientY };
  updateCamera();
});
canvas3d.addEventListener("wheel", e => {
  camSpherical.radius = Math.max(0.5, Math.min(60, camSpherical.radius + e.deltaY * 0.01));
  updateCamera();
});
canvas3d.addEventListener("dblclick", () => fitCamera());

// =======================================================================
// Raycasting helpers
// =======================================================================
const raycaster = new THREE.Raycaster();
const ndc       = new THREE.Vector2();

function raycastFloor(e) {
  if (!mapData) return null;
  const rect = canvas3d.getBoundingClientRect();
  ndc.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  ndc.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);

  const floorZ = mapData.metadata.floor_z || 0;
  const plane  = new THREE.Plane(new THREE.Vector3(0, 0, 1), -floorZ);
  const hit    = new THREE.Vector3();
  if (!raycaster.ray.intersectPlane(plane, hit)) return null;
  return hit;
}

// =======================================================================
// Occupancy-grid collision check for the four sides of the goal footprint
// =======================================================================
function cellIsObstacle(wx, wy) {
  if (!mapData || !mapData.grid) return false;
  const meta = mapData.metadata;
  const col = Math.floor((wx - meta.min_x) / meta.resolution);
  const row = Math.floor((wy - meta.min_y) / meta.resolution);
  if (col < 0 || col >= meta.grid_width)  return false;
  if (row < 0 || row >= meta.grid_height) return false;
  return mapData.grid[row][col] === 2;
}

function segmentTouchesObstacle(p0, p1, samples) {
  for (let i = 0; i <= samples; i++) {
    const t  = i / samples;
    const wx = p0.x + (p1.x - p0.x) * t;
    const wy = p0.y + (p1.y - p0.y) * t;
    if (cellIsObstacle(wx, wy)) return true;
  }
  return false;
}

function localToWorld(lx, ly, yaw, cx, cy) {
  const c = Math.cos(yaw), s = Math.sin(yaw);
  return { x: cx + c * lx - s * ly,
           y: cy + s * lx + c * ly };
}

function computeCollisionSides(wx, wy, yaw_rad, sx, sy) {
  if (!mapData || !mapData.grid) return null;
  const FR = localToWorld( sx/2, -sy/2, yaw_rad, wx, wy);
  const FL = localToWorld( sx/2,  sy/2, yaw_rad, wx, wy);
  const BR = localToWorld(-sx/2, -sy/2, yaw_rad, wx, wy);
  const BL = localToWorld(-sx/2,  sy/2, yaw_rad, wx, wy);
  const N  = COLLISION_SAMPLES_PER_SIDE;
  return {
    front: segmentTouchesObstacle(FR, FL, N),
    back:  segmentTouchesObstacle(BR, BL, N),
    left:  segmentTouchesObstacle(BL, FL, N),
    right: segmentTouchesObstacle(BR, FR, N),
  };
}

// =======================================================================
// Click handler — branches based on poseMode
// =======================================================================
canvas3d.addEventListener("click", e => {
  if (!mapData) return;
  if (dragMoved) return;

  const hit = raycastFloor(e);
  if (!hit) return;

  const meta   = mapData.metadata;
  const margin = 0.5;
  const inside = hit.x >= meta.min_x - margin && hit.x <= meta.max_x + margin &&
                 hit.y >= meta.min_y - margin && hit.y <= meta.max_y + margin;

  if (poseMode === POSE_MODE.PLACING) {
    if (!inside) {
      // Same feedback as the goal-placement path — without this, an
      // out-of-bounds click in PLACING mode silently fails and looks
      // like nothing happened.
      showToast("Click is outside the mapped area");
      return;
    }
    pendingPose = { x: hit.x, y: hit.y, yaw_rad: 0 };
    poseMode    = POSE_MODE.SETTING_YAW;
    document.getElementById("setPoseBtn").textContent = "\u{1F4CD} Move to set yaw, click to confirm";
    updatePendingPoseMarker();
    return;
  }

  if (poseMode === POSE_MODE.SETTING_YAW) {
    postInitialPose(pendingPose);
    return;
  }

  if (poseMode === POSE_MODE.GOAL_YAW) {
    confirmGoal(pendingPose);
    return;
  }

  if (!inside) {
    showToast("Click is outside the mapped area");
    return;
  }
  // Wipe any previously-confirmed goal BEFORE drawing the new pending
  // preview. Without this, a leftover goalGroup from the last
  // confirm-cycle stays on screen alongside the new preview until the
  // user clicks again to confirm — the user never wants both at once.
  clearGoal();

  const initialYawRad = parseFloat(document.getElementById("orientSlider").value) * Math.PI / 180;
  pendingPose = { x: hit.x, y: hit.y, yaw_rad: initialYawRad };
  poseMode    = POSE_MODE.GOAL_YAW;
  document.getElementById("valX").textContent = hit.x.toFixed(3);
  document.getElementById("valX").className   = "";
  document.getElementById("valY").textContent = hit.y.toFixed(3);
  document.getElementById("valY").className   = "";
  document.getElementById("valZ").textContent = (meta.floor_z || 0).toFixed(3);
  document.getElementById("valZ").className   = "";
  updatePendingPoseMarker();
});

// =======================================================================
// Mousemove during SETTING_YAW or GOAL_YAW
// =======================================================================
canvas3d.addEventListener("mousemove", e => {
  if ((poseMode !== POSE_MODE.SETTING_YAW && poseMode !== POSE_MODE.GOAL_YAW)
      || !pendingPose) return;
  const hit = raycastFloor(e);
  if (!hit) return;
  pendingPose.yaw_rad = Math.atan2(hit.y - pendingPose.y, hit.x - pendingPose.x);
  updatePendingPoseMarker();
});

// =======================================================================
// Set Initial Pose — button + state-machine helpers
// =======================================================================

// Which robot the next Set Initial Pose hint will seed. Wired to the
// segmented R1 / R2 picker in the header. Defaults to R1 so the
// behaviour is the same as before the picker was added when the user
// hasn't touched it.
let initialPoseTargetRobotId = ROBOTS[0] ? ROBOTS[0].id : "default";

document.querySelectorAll(".init-target-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    initialPoseTargetRobotId = btn.dataset.robotId || "default";
    document.querySelectorAll(".init-target-btn")
            .forEach(b => b.classList.toggle(
              "active", b.dataset.robotId === initialPoseTargetRobotId));
    // If a Set-Initial-Pose flow is mid-flight, cancel it so the next
    // anchor click clearly applies to the newly selected target.
    if (poseMode === POSE_MODE.PLACING || poseMode === POSE_MODE.SETTING_YAW) {
      cancelInitialPose();
    }
  });
});

document.getElementById("setPoseBtn").addEventListener("click", () => {
  if (poseMode === POSE_MODE.PLACING || poseMode === POSE_MODE.SETTING_YAW) {
    cancelInitialPose();
    return;
  }
  if (poseMode === POSE_MODE.GOAL_YAW) {
    poseMode    = POSE_MODE.IDLE;
    pendingPose = null;
    removePendingPoseMarker();
  }
  clearGoal();
  poseMode = POSE_MODE.PLACING;
  const btn = document.getElementById("setPoseBtn");
  btn.classList.add("active");
  btn.textContent = "\u{1F4CD} Click on map to anchor "
                  + targetLabelFor(initialPoseTargetRobotId);
});

// Map a robot id back to its R1 / R2 label so button text can mention
// the active target without baking R1=tb3_0 into the string in two
// places.
function targetLabelFor(rid) {
  const r = ROBOTS.find(rr => rr.id === rid);
  return r ? r.label : rid;
}

function cancelInitialPose() {
  poseMode    = POSE_MODE.IDLE;
  pendingPose = null;
  removePendingPoseMarker();

  const btn = document.getElementById("setPoseBtn");
  btn.classList.remove("active");
  if (!btn._flashing) {
    btn.textContent = "\u{1F4CD} Set Initial Pose";
  }
}

async function postInitialPose(pose) {
  // Per-robot endpoint: server stores the hint in the picked robot's
  // queue and only the matching ros_pose_bridge.py instance picks it up.
  // robot_id is also included in the body for symmetry / debug-logging.
  const targetId = initialPoseTargetRobotId || "default";
  const url      = "/set_initial_pose/" + encodeURIComponent(targetId);

  // Standalone-mode rendering: schedule a manual "localized" override
  // at the robot's pre-configured FIXED_INITIAL_POSE. After the delay
  // the box renders on the map without needing any external bridge or
  // fake-pose publisher running. If a real bridge IS running, its
  // first /pose POST will clear this override (see pollOneRobot).
  const fixed = FIXED_INITIAL_POSE[targetId];
  if (fixed) {
    setTimeout(() => {
      manualLocalized[targetId] = {
        available:          true,
        localized:          true,
        robot_id:           targetId,
        x:                  fixed.x,
        y:                  fixed.y,
        yaw_rad:            fixed.yaw_rad,
        yaw_deg:            fixed.yaw_rad * 180 / Math.PI,
        frame:              "map",
        last_match_age_sec: 0,
        age_sec:            0,
        wall_clock_iso:     new Date().toISOString(),
      };
      console.log(`[init] ${targetId} localized at fixed pose`,
                  `(${fixed.x.toFixed(2)}, ${fixed.y.toFixed(2)}, `
                  + `yaw=${(fixed.yaw_rad * 180 / Math.PI).toFixed(0)}°)`);
    }, INITIAL_POSE_RENDER_DELAY_MS);
  } else {
    console.warn(`[init] no FIXED_INITIAL_POSE for "${targetId}"; `
                 + `the box won't auto-render. Add an entry under that id.`);
  }

  // Still POST to the server so any real ros_pose_bridge running with
  // robot_id:=<targetId> can pick it up and feed RTAB-Map. Best-effort:
  // a 5xx here doesn't block the standalone rendering.
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        x:        pose.x,
        y:        pose.y,
        yaw_rad:  pose.yaw_rad,
        robot_id: targetId,
      }),
    });
    if (res.ok) {
      const j = await res.json();
      console.log("Initial pose queued for", targetId, "seq=", j.seq);
      flashConfirmation(targetId);
    } else {
      console.warn("Initial pose POST failed:", res.status);
      // Still flash so the user gets feedback that the local seed is queued.
      flashConfirmation(targetId);
    }
  } catch (err) {
    console.warn("Initial pose POST unreachable (standalone mode):", err.message);
    flashConfirmation(targetId);
  }
  cancelInitialPose();
}

function flashConfirmation(targetId) {
  const btn = document.getElementById("setPoseBtn");
  btn._flashing = true;
  const lbl = targetId ? targetLabelFor(targetId) : "";
  btn.textContent = lbl
    ? `✓ ${lbl} pose sent — RTAB-Map matching…`
    : "✓ Pose sent — RTAB-Map matching…";
  btn.style.background  = "var(--success)";
  btn.style.color       = "var(--bg)";
  btn.style.borderColor = "var(--success)";
  setTimeout(() => {
    btn._flashing = false;
    btn.textContent = "\u{1F4CD} Set Initial Pose";
    btn.style.background  = "";
    btn.style.color       = "";
    btn.style.borderColor = "";
  }, 2500);
}

document.addEventListener("keydown", ev => {
  if (ev.key === "Escape" && poseMode !== POSE_MODE.IDLE) cancelInitialPose();
});

// =======================================================================
// Animation loop
// =======================================================================
(function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
})();

// =======================================================================
// Cloud
// =======================================================================
function buildCloud(points, colors) {
  if (cloudObj) {
    scene.remove(cloudObj);
    cloudObj.geometry.dispose();
    cloudObj.material.dispose();
  }

  const N = points.length;
  const positions = new Float32Array(N * 3);
  const cols      = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    positions[i*3]     = points[i][0];
    positions[i*3 + 1] = points[i][1];
    positions[i*3 + 2] = points[i][2];
    const c = colors[i] || [150, 150, 150];
    cols[i*3]     = c[0] / 255;
    cols[i*3 + 1] = c[1] / 255;
    cols[i*3 + 2] = c[2] / 255;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geo.setAttribute("color",    new THREE.BufferAttribute(cols,      3));

  const mat = new THREE.PointsMaterial({
    size: 0.02, vertexColors: true, sizeAttenuation: true
  });
  cloudObj = new THREE.Points(geo, mat);

  geo.computeBoundingBox();
  geo.boundingBox.getCenter(cloudCenter);
  geo.computeBoundingSphere();
  cloudFitR = geo.boundingSphere.radius;

  scene.add(cloudObj);

  const xs = geo.boundingBox.max.x - geo.boundingBox.min.x;
  const ys = geo.boundingBox.max.y - geo.boundingBox.min.y;
  const sz = Math.ceil(Math.max(xs, ys, 4)) + 2;

  const floorZ = mapData.metadata.floor_z || 0;
  const grid   = new THREE.GridHelper(sz, sz, 0xffeffe, 0xf4cdf1);
  grid.rotation.x = Math.PI / 2;
  grid.position.set(cloudCenter.x, cloudCenter.y, floorZ);
  scene.add(grid);

  const axes = new THREE.AxesHelper(1.0);
  axes.position.set(cloudCenter.x, cloudCenter.y, floorZ);
  scene.add(axes);
}

// =======================================================================
// Generic primitives
// =======================================================================
function buildArrow(start, end, color) {
  const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color }));
}

// Heading arrow: cylinder shaft + cone head along robot-local +X.
// Apex at +0.40 m so the arrow extends past the front face of a 35 cm box.
function buildHeadingArrow(color) {
  const grp = new THREE.Group();

  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.012, 0.012, 0.32, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  shaft.rotation.z = -Math.PI / 2;
  shaft.position.x = 0.16;
  grp.add(shaft);

  const head = new THREE.Mesh(
    new THREE.ConeGeometry(0.035, 0.08, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  head.rotation.z = -Math.PI / 2;
  head.position.x = 0.36;
  grp.add(head);

  return grp;
}

// 12-edge thick-wireframe box (sx × sy × sz). Bottom on the floor.
// `collisions` is an optional { front, back, left, right } map; sides
// flagged true get DANGER_COLOR edges + caps.
function buildBoxFrame(sx, sy, sz, color, opts = {}) {
  const env = new THREE.Group();
  const t   = 0.012;
  const collisions = opts.collisions || null;
  const withEndCaps = !!opts.withEndCaps;

  const pickColour = (sides) => {
    if (!collisions) return color;
    for (const s of sides) if (collisions[s]) return DANGER_COLOR;
    return color;
  };

  // 4 X-axis edges (depth direction)
  for (const ys of [-sy/2, sy/2]) {
    for (const zs of [-sz/2, sz/2]) {
      const sideName = ys > 0 ? 'left' : 'right';
      const m = new THREE.MeshBasicMaterial({ color: pickColour([sideName]) });
      const e = new THREE.Mesh(new THREE.BoxGeometry(sx + t, t, t), m);
      e.position.set(0, ys, zs);
      env.add(e);
    }
  }
  // 4 Y-axis edges (transverse direction)
  for (const xs of [-sx/2, sx/2]) {
    for (const zs of [-sz/2, sz/2]) {
      const sideName = xs > 0 ? 'front' : 'back';
      const m = new THREE.MeshBasicMaterial({ color: pickColour([sideName]) });
      const e = new THREE.Mesh(new THREE.BoxGeometry(t, sy + t, t), m);
      e.position.set(xs, 0, zs);
      env.add(e);
    }
  }
  // 4 vertical edges (corners — shared between two adjacent sides)
  for (const xs of [-sx/2, sx/2]) {
    for (const ys of [-sy/2, sy/2]) {
      const fb = xs > 0 ? 'front' : 'back';
      const lr = ys > 0 ? 'left'  : 'right';
      const m  = new THREE.MeshBasicMaterial({ color: pickColour([fb, lr]) });
      const e  = new THREE.Mesh(new THREE.BoxGeometry(t, t, sz + t), m);
      e.position.set(xs, ys, 0);
      env.add(e);
    }
  }

  env.position.z = sz / 2;

  if (withEndCaps) {
    const endRect = new THREE.PlaneGeometry(sx, sz);
    for (const offY of [-sy/2, sy/2]) {
      const sideName = offY > 0 ? 'left' : 'right';
      const capColor = pickColour([sideName]);
      const cap = new THREE.Mesh(endRect, new THREE.MeshBasicMaterial({
        color: capColor, transparent: true, opacity: 0.18,
        side: THREE.DoubleSide, depthWrite: false,
      }));
      cap.position.set(0, offY, 0);
      cap.rotation.x = -Math.PI / 2;
      env.add(cap);
    }
  }

  return env;
}

// Small "I am here" marker for the virtual centre — sphere + floor disk.
function buildCentreMarker(color) {
  const grp = new THREE.Group();

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 16, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  sphere.position.z = 0.05;
  grp.add(sphere);

  const disk = new THREE.Mesh(
    new THREE.CircleGeometry(0.07, 24),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.5, depthWrite: false
    })
  );
  disk.position.z = 0.005;
  grp.add(disk);

  return grp;
}

// =======================================================================
// Per-robot marker — single 35 × 35 × 10 cm box, optionally with arrow
// =======================================================================
function buildRobotBox(color, withArrow) {
  const grp = new THREE.Group();
  grp.add(buildBoxFrame(ROBOT_BODY_M, ROBOT_BODY_M, ROBOT_HEIGHT_M, color));
  if (withArrow) grp.add(buildHeadingArrow(color));
  return grp;
}

// =======================================================================
// Robot-marker dispatcher — decides which view to render based on which
// robots are localized:
//   0 robots → nothing
//   1 robot  → that robot's box + heading arrow
//   2 robots → both boxes (no arrows) + outer frame + virtual centre + arrow
// =======================================================================
function disposeGroup(grp) {
  if (!grp) return;
  scene.remove(grp);
  grp.traverse(c => {
    if (c.geometry) c.geometry.dispose();
    if (c.material) {
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  });
}

function clearAllRobotMarkers() {
  for (const id of Object.keys(robotMarkerGroups)) {
    if (robotMarkerGroups[id]) {
      disposeGroup(robotMarkerGroups[id]);
      robotMarkerGroups[id] = null;
    }
  }
  if (combinedMarkerGroup) {
    disposeGroup(combinedMarkerGroup);
    combinedMarkerGroup = null;
  }
}

function updateRobotMarkers() {
  if (!mapData) return;

  // Snapshot of which robots are currently localized.
  const localized = ROBOTS
    .map(r => ({ r, p: robotPoses[r.id] }))
    .filter(({ p }) => p && p.localized);

  clearAllRobotMarkers();

  // Default: no formation. Recomputed below if (and only if) both
  // robots are localized. This means consumers can rely on
  // `systemFormation` being null whenever the dual-robot frame isn't
  // currently shown.
  const prevFormation = systemFormation;
  systemFormation = null;

  if (localized.length === 0) {
    logFormationChange(prevFormation, null);
    return;
  }

  const floorZ = mapData.metadata.floor_z || 0;

  if (localized.length === 1) {
    // Single-robot mode — show just that robot with its heading arrow.
    const { r, p } = localized[0];
    const grp = buildRobotBox(MARKER_COLOR, /*withArrow=*/true);
    grp.position.set(p.x, p.y, floorZ + 0.02);
    grp.rotation.z = p.yaw_rad;
    scene.add(grp);
    robotMarkerGroups[r.id] = grp;
    logFormationChange(prevFormation, null);
    return;
  }

  // Both robots localized: per-robot boxes WITHOUT arrows, plus the
  // combined outer frame + virtual centre with the system heading arrow.
  for (const { r, p } of localized) {
    const grp = buildRobotBox(MARKER_COLOR, /*withArrow=*/false);
    grp.position.set(p.x, p.y, floorZ + 0.02);
    grp.rotation.z = p.yaw_rad;
    scene.add(grp);
    robotMarkerGroups[r.id] = grp;
  }

  // ---- Formation math ----
  // Virtual centre = midpoint of the two robot centres.
  // System yaw    = circular mean of the two yaws (handles wrap-around).
  // Per-robot offset = (robot.xy − centre.xy), stored both in the world
  // (ROS map) frame and in the system body frame so callers can pick
  // whichever they need without redoing the rotation.
  const a = { id: localized[0].r.id, ...localized[0].p };
  const b = { id: localized[1].r.id, ...localized[1].p };

  const cx     = (a.x + b.x) / 2;
  const cy     = (a.y + b.y) / 2;
  const dist   = Math.hypot(b.x - a.x, b.y - a.y);
  const yawSys = Math.atan2(
    Math.sin(a.yaw_rad) + Math.sin(b.yaw_rad),
    Math.cos(a.yaw_rad) + Math.cos(b.yaw_rad)
  );

  const cYaw = Math.cos(yawSys), sYaw = Math.sin(yawSys);
  const offsets = {};
  for (const robot of [a, b]) {
    const wx = robot.x - cx;
    const wy = robot.y - cy;
    // Inverse rotation by yawSys → body-frame offset (R(-yaw) · w).
    const lx =  cYaw * wx + sYaw * wy;
    const ly = -sYaw * wx + cYaw * wy;
    offsets[robot.id] = {
      world: { x: wx, y: wy },
      local: { x: lx, y: ly },
    };
  }

  systemFormation = {
    centre:   { x: cx, y: cy, yaw_rad: yawSys },
    distance: dist,
    offsets,
  };

  combinedMarkerGroup = buildCombinedMarker(systemFormation, floorZ);
  scene.add(combinedMarkerGroup);

  // Same publish path as Send Goal — direct over rosbridge to
  // /formation/offsets (geometry_msgs/PoseArray, one pose per robot,
  // ordered parallel to ROBOTS).
  publishFormationOffset(systemFormation);

  logFormationChange(prevFormation, systemFormation);
}

// Combined marker: outer frame around both robots + virtual centre +
// system-direction arrow. Geometry is fully described by the formation
// object built in updateRobotMarkers — this function just turns numbers
// into THREE objects.
function buildCombinedMarker(formation, floorZ) {
  const { centre: { x: cx, y: cy, yaw_rad: yawSys },
          distance: dist } = formation;

  const outer = new THREE.Group();
  // Outer frame: length runs along the system's transverse axis (Y in
  // local frame), so it spans both robot centres plus a half-body of
  // pad on each end so each footprint sits fully inside.
  outer.add(buildBoxFrame(
    ROBOT_BODY_M,                  // depth, along system +X
    dist + ROBOT_BODY_M,           // length, transverse — covers both robots
    ROBOT_HEIGHT_M,
    MARKER_COLOR,
    { withEndCaps: true }
  ));
  outer.add(buildCentreMarker(MARKER_COLOR));   // virtual centre
  outer.add(buildHeadingArrow(MARKER_COLOR));   // system heading arrow

  outer.position.set(cx, cy, floorZ + 0.02);
  outer.rotation.z = yawSys;
  return outer;
}

// Log only on the null↔non-null transition (one robot losing/regaining
// lock, etc.). Continuous per-tick logs would flood the console at the
// 200 ms poll rate; if you want the live values, read `systemFormation`
// directly in DevTools — it's updated in place every poll.
function logFormationChange(prev, curr) {
  const key = (prev ? '1' : '0') + (curr ? '1' : '0');
  if (key === _lastFormationKey) return;
  _lastFormationKey = key;
  if (!prev && curr) {
    console.log('[formation] both robots localized →',
      `centre=(${curr.centre.x.toFixed(3)}, ${curr.centre.y.toFixed(3)})`,
      `yaw=${(curr.centre.yaw_rad * 180 / Math.PI).toFixed(1)}deg`,
      `dist=${curr.distance.toFixed(3)}m`,
      'offsets=', curr.offsets);
  } else if (prev && !curr) {
    console.log('[formation] cleared (one or both robots no longer localized)');
  }
}

// =======================================================================
// Goal marker — uses the goal-specific dimensions + collision check.
// =======================================================================
function updateGoalMarker() {
  if (goalGroup) {
    disposeGroup(goalGroup);
    goalGroup = null;
  }
  if (!goal) return;

  const yawRad     = goal.orientation * Math.PI / 180;
  const goalLen    = currentGoalLength();
  const collisions = computeCollisionSides(goal.x, goal.y, yawRad,
                                           GOAL_WIDTH_M, goalLen);

  goalGroup = new THREE.Group();
  goalGroup.add(buildBoxFrame(GOAL_WIDTH_M, goalLen, ROBOT_HEIGHT_M,
                              MARKER_COLOR, { collisions, withEndCaps: true }));
  goalGroup.add(buildHeadingArrow(MARKER_COLOR));

  goalGroup.position.set(goal.x, goal.y, (goal.z || 0) + 0.02);
  goalGroup.rotation.z = yawRad;
  scene.add(goalGroup);
}

function clearGoal() {
  if (goalGroup) {
    disposeGroup(goalGroup);
    goalGroup = null;
  }
  goal = null;
  ['valX', 'valY', 'valZ'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '—';
    el.className   = 'empty';
  });
  document.getElementById('sendBtn').disabled = true;
  clearPlanGroup();
}

function confirmGoal(p) {
  if (!mapData) return;
  const meta   = mapData.metadata;
  const floorZ = meta.floor_z || 0;

  const yawDeg = ((p.yaw_rad * 180 / Math.PI) % 360 + 360) % 360;
  goal = { x: p.x, y: p.y, z: floorZ, orientation: yawDeg };

  const slider = document.getElementById('orientSlider');
  const slVal  = document.getElementById('orientVal');
  slider.value      = String(Math.round(yawDeg) % 360);
  slVal.textContent = slider.value + '°';

  document.getElementById('valX').textContent = p.x.toFixed(3);
  document.getElementById('valX').className   = '';
  document.getElementById('valY').textContent = p.y.toFixed(3);
  document.getElementById('valY').className   = '';
  document.getElementById('valZ').textContent = floorZ.toFixed(3);
  document.getElementById('valZ').className   = '';
  document.getElementById('sendBtn').disabled = false;

  poseMode    = POSE_MODE.IDLE;
  pendingPose = null;
  removePendingPoseMarker();
  updateGoalMarker();
}

// =======================================================================
// Plan-path overlay — yellow waypoint dots on the floor. Driven by the
// Send Goal handler: POST /plan, render whatever waypoints come back in
// the response. No polling, no separate button.
// =======================================================================
function clearPlanGroup() {
  if (planGroup3d) { disposeGroup(planGroup3d); planGroup3d = null; }
  planGroup3d = new THREE.Group();
  scene.add(planGroup3d);
}

function renderPlan3D(waypoints) {
  if (!Array.isArray(waypoints) || !mapData) return;
  clearPlanGroup();
  const floorZ = (mapData.metadata.floor_z || 0) + 0.005;
  for (const [wx, wy] of waypoints) {
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 12, 12),
      new THREE.MeshBasicMaterial({ color: 0xffd33f }));
    sphere.position.set(wx, wy, floorZ + 0.01);
    planGroup3d.add(sphere);
  }
}

// Robot marker (rosbridge feed) — kept for debugging the EKF output.
function updateRobotMarker(pose) {
  if (robotGroup) scene.remove(robotGroup);
  robotGroup = new THREE.Group();

  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0x00e5a0 })
  );
  const center = new THREE.Vector3(pose.x, pose.y, (pose.z || 0) + 0.05);
  sphere.position.copy(center);
  robotGroup.add(sphere);

  const tip = new THREE.Vector3(
    center.x + Math.cos(pose.yaw) * 0.50,
    center.y + Math.sin(pose.yaw) * 0.50,
    center.z
  );
  robotGroup.add(buildArrow(center, tip, 0x00e5a0));

  scene.add(robotGroup);
}

// =======================================================================
// Pending-pose preview (Set Initial Pose / Goal placement)
// =======================================================================
function updatePendingPoseMarker() {
  if (pendingPoseGroup) {
    disposeGroup(pendingPoseGroup);
    pendingPoseGroup = null;
  }
  if (!pendingPose || !mapData) return;

  const floorZ        = mapData.metadata.floor_z || 0;
  const isGoalPreview = (poseMode === POSE_MODE.GOAL_YAW);

  pendingPoseGroup = new THREE.Group();
  if (isGoalPreview) {
    // Use the goal envelope so the preview matches the final goal marker.
    // Length tracks the live inter-robot distance when both robots are
    // localized, falling back to the 50 cm default otherwise.
    const goalLen    = currentGoalLength();
    const collisions = computeCollisionSides(pendingPose.x, pendingPose.y,
                                             pendingPose.yaw_rad,
                                             GOAL_WIDTH_M, goalLen);
    pendingPoseGroup.add(buildBoxFrame(GOAL_WIDTH_M, goalLen, ROBOT_HEIGHT_M,
                                       MARKER_COLOR, { collisions, withEndCaps: true }));
    pendingPoseGroup.add(buildHeadingArrow(MARKER_COLOR));
  } else {
    // Initial-pose preview — single-robot 35 × 35 × 10 cm box + heading
    // arrow. withEndCaps adds translucent solid faces front/back so the
    // marker reads as a body, not just a wire frame — much easier to
    // spot against the textured point cloud than 12 thin edges alone.
    pendingPoseGroup.add(buildBoxFrame(ROBOT_BODY_M, ROBOT_BODY_M, ROBOT_HEIGHT_M,
                                       MARKER_COLOR, { withEndCaps: true }));
    pendingPoseGroup.add(buildHeadingArrow(MARKER_COLOR));
  }
  pendingPoseGroup.position.set(pendingPose.x, pendingPose.y, floorZ + 0.02);
  pendingPoseGroup.rotation.z = pendingPose.yaw_rad;
  scene.add(pendingPoseGroup);
}

function removePendingPoseMarker() {
  if (pendingPoseGroup) {
    disposeGroup(pendingPoseGroup);
    pendingPoseGroup = null;
  }
}

// =======================================================================
// Slider + Send Goal
// =======================================================================
document.getElementById("orientSlider").addEventListener("input", e => {
  document.getElementById("orientVal").textContent = e.target.value + "°";
  if (goal) {
    goal.orientation = parseFloat(e.target.value);
    updateGoalMarker();
  }
});

// Compute collisions for the CURRENTLY-SET goal, exactly the way the
// goal envelope renders them. If any side comes back true the box has
// red edges — same data the user is already looking at on screen.
function goalCollisionSides(g) {
  if (!g) return null;
  const yawRad  = g.orientation * Math.PI / 180;
  const goalLen = currentGoalLength();
  return computeCollisionSides(g.x, g.y, yawRad, GOAL_WIDTH_M, goalLen);
}

document.getElementById("sendBtn").addEventListener("click", async () => {
  if (!goal) return;
  const btn = document.getElementById("sendBtn");

  // Refuse to publish a goal whose footprint overlaps an obstacle.
  const sides = goalCollisionSides(goal);
  if (sides && (sides.front || sides.back || sides.left || sides.right)) {
    const hits = ['front','back','left','right'].filter(s => sides[s]);
    showToast(
      `Goal blocked: overlaps obstacle on ${hits.join(', ')} side`
        + (hits.length > 1 ? 's' : '')
        + ` — move it off the red edges before sending.`,
      'warning'
    );
    btn.textContent       = "Blocked";
    btn.style.borderColor = "var(--accent2)";
    btn.style.color       = "var(--accent2)";
    setTimeout(() => {
      btn.textContent       = "Send Goal";
      btn.style.borderColor = "";
      btn.style.color       = "";
    }, 2500);
    return;
  }

  btn.disabled    = true;
  btn.textContent = "Planning…";

  // Plan a path from the virtual centre to the goal, render the dots,
  // then publish the goal to ROS. Planning is best-effort: if the
  // formation isn't up or A* fails we still publish, so a single-robot
  // run keeps working.
  let plannedCount = 0;
  if (systemFormation) {
    try {
      // Pass each robot's BODY-frame offset (computed in updateRobotMarkers
      // when both robots first localized). Order matches ROBOTS so the
      // server's `robots[i]` lines up with the GUI's. The server uses
      // the max offset magnitude + its own per-robot radius to derive
      // the inflation radius — so the planner stays in sync with the
      // live inter-robot distance.
      const robotsForPlan = ROBOTS.map(r => {
        const local = systemFormation.offsets[r.id]?.local || { x: 0, y: 0 };
        return {
          name:         r.id,
          offset_local: [local.x, local.y],
        };
      });
      const r = await fetch("/plan", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({
          start:  { x: systemFormation.centre.x, y: systemFormation.centre.y },
          goal:   { x: goal.x,                   y: goal.y },
          robots: robotsForPlan,
        }),
      });
      const j = await r.json().catch(() => ({}));
      if (r.ok && Array.isArray(j.waypoints)) {
        renderPlan3D(j.waypoints);
        publishFormationPath(j.waypoints, j.headings);
        plannedCount = j.waypoints.length;
      } else if (!r.ok) {
        showToast(`Plan failed: ${j.error || r.status}`, "warning");
      }
    } catch (e) {
      showToast(`Plan error: ${e.message}`, "warning");
    }
  }

  btn.textContent = "Sent ✓";
  btn.classList.add("sent");
  const tail = plannedCount ? ` · ${plannedCount} waypoints` : '';
  showToast(`Goal → X:${goal.x.toFixed(2)} Y:${goal.y.toFixed(2)} θ:${goal.orientation}°${tail}`);
  setTimeout(() => {
    btn.textContent = "Send Goal";
    btn.classList.remove("sent");
    btn.disabled = false;
  }, 2500);
});

// =======================================================================
// Status helpers
// =======================================================================
function setStatus(connected, text) {
  // Map stats are now a muted plain-text line under the panel label, not a
  // pill. The `connected` arg is kept for API compatibility with callers
  // (e.g. the load-failure path) but the line is rendered the same either
  // way — quiet info, not a status indicator.
  const line = document.getElementById("mapStatsLine");
  if (line) line.textContent = text;
}
function setRosStatus(connected) {
  const pill = document.getElementById("rosPill");
  pill.className = "status-pill" + (connected ? " connected" : "");
  pill.querySelector(".ros-text").textContent = connected ? "ROS Connected" : "ROS Disconnected";
}
function setLocPill(slot, cls, text) {
  const pill = document.getElementById("locStatus" + slot);
  pill.className = "status-pill " + cls;
  document.getElementById("locStatus" + slot + "Text").textContent = text;
}
function showToast(msg, level) {
  // level: undefined / "info" → green default; "warning" / "error" → red.
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("warning");
  if (level === "warning" || level === "error") t.classList.add("warning");
  t.classList.add("show");
  setTimeout(() => {
    t.classList.remove("show");
    t.classList.remove("warning");
  }, 3000);
}

// =======================================================================
// Rosbridge — robot pose subscription + goal publishing
// =======================================================================
const ros = new ROSLIB.Ros({ url: ROSBRIDGE_URL });
ros.on("connection", () => { setRosStatus(true); subscribeToRobotPose(); });
ros.on("error", () => setRosStatus(false));
ros.on("close", () => {
  setRosStatus(false);
  setTimeout(() => ros.connect(ROSBRIDGE_URL), 3000);
});

function subscribeToRobotPose() {
  const t = new ROSLIB.Topic({ ros, name: ROBOT_POSE_TOPIC, messageType: "geometry_msgs/PoseStamped" });
  t.subscribe(msg => {
    const p = msg.pose.position;
    const q = msg.pose.orientation;
    const yaw = Math.atan2(2 * (q.w * q.z + q.x * q.y),
                           1 - 2 * (q.y * q.y + q.z * q.z));
    robotPose = { x: p.x, y: p.y, z: p.z, yaw };
    updateRobotMarker(robotPose);
  });
}

// =======================================================================
// /formation/offsets — published while BOTH robots are localized.
//
// One geometry_msgs/PoseArray per tick; poses[i].position.{x,y} carries
// robot i's WORLD-frame offset from the virtual centre (i.e.
// robot.xy − centre.xy in the ROS map frame). Pose ordering matches
// the ROBOTS config exactly: poses[0] is tb3_0/R1, poses[1] is tb3_1/R2.
// orientation is identity (each robot's own yaw is already on
// /<robot_id>/pose via ros_pose_bridge).
//
// Same publish path as Send Goal — direct over rosbridge. The Flask
// server is not involved.
// =======================================================================
const formationOffsetTopic = new ROSLIB.Topic({
  ros,
  name:        FORMATION_OFFSET_TOPIC,
  messageType: "geometry_msgs/PoseArray",
});

function publishFormationOffset(formation) {
  if (!formation) return;
  const poses = ROBOTS.map(r => {
    const off = formation.offsets[r.id]?.world ?? { x: 0, y: 0 };
    return {
      position:    { x: off.x, y: off.y, z: 0.0 },
      orientation: { x: 0.0,   y: 0.0,   z: 0.0, w: 1.0 },
    };
  });
  const msg = new ROSLIB.Message({
    header: { frame_id: "map", stamp: { secs: 0, nsecs: 0 } },
    poses,
  });
  formationOffsetTopic.publish(msg);
}

// =======================================================================
// /formation/path — published once after every successful Send Goal plan.
//
// One geometry_msgs/PoseArray; poses[i].position.{x,y} carries the
// virtual centre's i-th waypoint in the ROS map frame, and
// poses[i].orientation carries the path tangent at that waypoint
// (yaw → quaternion). z is the floor height from the loaded map. The
// architecture doc calls this topic latched / transient_local — the
// rosbridge_server side configures durability QoS, this client just
// publishes once per plan.
// =======================================================================
const formationPathTopic = new ROSLIB.Topic({
  ros,
  name:        FORMATION_PATH_TOPIC,
  messageType: "geometry_msgs/PoseArray",
});

function publishFormationPath(waypoints, headings) {
  if (!Array.isArray(waypoints) || waypoints.length === 0) return;
  const floorZ = (mapData && mapData.metadata && mapData.metadata.floor_z) || 0.0;
  const poses  = waypoints.map((wp, i) => {
    const yaw = (Array.isArray(headings) && headings.length === waypoints.length)
                  ? headings[i] : 0.0;
    return {
      position:    { x: wp[0], y: wp[1], z: floorZ },
      orientation: { x: 0.0, y: 0.0,
                     z: Math.sin(yaw / 2),
                     w: Math.cos(yaw / 2) },
    };
  });
  const msg = new ROSLIB.Message({
    header: { frame_id: "map", stamp: { secs: 0, nsecs: 0 } },
    poses,
  });
  formationPathTopic.publish(msg);
}

// =======================================================================
// Multi-robot pose polling
//
// Each robot's bridge POSTs to /pose with `robot_id` set; the server
// stores the latest per robot and exposes per-robot reads at /pose/{id}.
// We poll all configured robots in parallel each tick, then re-render.
// =======================================================================
async function pollOneRobot(robot) {
  // 1. If a real bridge is publishing, prefer its data and clear any
  //    stale manual override so we don't fight the live feed.
  // 2. Otherwise fall back to the manual override set by the
  //    Set Initial Pose flow (FIXED_INITIAL_POSE).
  // 3. Otherwise: nothing to show.
  try {
    const res  = await fetch(robot.url, { cache: "no-store" });
    if (res.ok) {
      const data = await res.json();
      if (data && data.available) {
        delete manualLocalized[robot.id];
        robotPoses[robot.id] = data;
        return { robot, status: 'ok', data };
      }
    }
    // Server up but no bridge data — try manual override.
    if (manualLocalized[robot.id]) {
      robotPoses[robot.id] = manualLocalized[robot.id];
      return { robot, status: 'ok', data: manualLocalized[robot.id] };
    }
    robotPoses[robot.id] = null;
    return { robot, status: 'no_bridge', data: null };
  } catch (e) {
    // Network error reaching the server — manual still applies.
    if (manualLocalized[robot.id]) {
      robotPoses[robot.id] = manualLocalized[robot.id];
      return { robot, status: 'ok', data: manualLocalized[robot.id] };
    }
    robotPoses[robot.id] = null;
    return { robot, status: 'fetch_error', error: e };
  }
}

async function pollAllRobots() {
  const results = await Promise.all(ROBOTS.map(pollOneRobot));
  updateLocPills(results);
  updateRobotMarkers();
}
setInterval(pollAllRobots, POSE_POLL_MS);

function updateLocPills(results) {
  results.forEach((res, i) => {
    const slot = i + 1;                   // 1-indexed pill ids
    const r    = res.robot;
    if (res.status === 'fetch_error') {
      setLocPill(slot, 'lost', `${r.label}: SERVER DOWN`);
      return;
    }
    if (res.status === 'http_error') {
      setLocPill(slot, 'lost', `${r.label}: HTTP ${res.http}`);
      return;
    }
    if (res.status === 'no_bridge') {
      setLocPill(slot, 'lost', `${r.label}: NO BRIDGE`);
      return;
    }
    const data = res.data;
    if (data.age_sec > 2) {
      setLocPill(slot, 'lost', `${r.label}: STALE ${data.age_sec.toFixed(1)}s`);
      return;
    }
    if (!data.localized) {
      setLocPill(slot, 'lost', `${r.label}: SEARCHING ${data.age_sec.toFixed(1)}s`);
      return;
    }
    if (data.last_match_age_sec !== null && data.last_match_age_sec > 5) {
      setLocPill(slot, 'dead-reckoning',
        `${r.label}: DEAD-RECK ${data.last_match_age_sec.toFixed(1)}s`);
      return;
    }
    setLocPill(slot, 'localized',
      `${r.label}: LIVE ${data.x.toFixed(2)},${data.y.toFixed(2)}`);
  });
}

// =======================================================================
// Resize, load, init
// =======================================================================
function onResize() {
  const w = panel3d.clientWidth, h = panel3d.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", onResize);

async function loadMap() {
  try {
    const res  = await fetch("/map", { cache: "no-store" });
    mapData    = await res.json();

    if (mapData.metadata.axis_convention &&
        mapData.metadata.axis_convention !== "z-up") {
      console.warn("Unexpected axis_convention:", mapData.metadata.axis_convention);
    }

    buildCloud(mapData.points, mapData.colors);

    onResize();
    fitCamera();

    document.getElementById("loading3d").style.display = "none";
    setStatus(true,
      `${mapData.metadata.point_count.toLocaleString()} pts · ` +
      `floor ${mapData.metadata.floor_z.toFixed(2)} m · ` +
      `bounds X[${mapData.metadata.min_x.toFixed(1)},${mapData.metadata.max_x.toFixed(1)}] ` +
      `Y[${mapData.metadata.min_y.toFixed(1)},${mapData.metadata.max_y.toFixed(1)}]`);
  } catch (e) {
    console.error(e);
    document.getElementById("loading3d").innerHTML =
      `<span style="color:var(--accent2)">Failed to load map: ${e.message}</span>`;
  }
}

window.addEventListener("load", () => {
  onResize();
  loadMap();
});
</script>

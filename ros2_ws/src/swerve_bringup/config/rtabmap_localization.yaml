# config/rtabmap_localization.yaml
/**:
  ros__parameters:
    # Mode: localization only
    Mem/IncrementalMemory: "false"
    Mem/InitWMWithAllNodes: "true"

    # Database path AND frame_id / odom_frame_id MUST be provided by the
    # launch configuration. They are per-robot ({robot_id}_base_link,
    # {robot_id}_odom) and have no safe default — leaving them as
    # "base_link" / "odom" silently breaks the multi-robot TF tree.
    map_frame_id: "map"

    # Subscriptions
    subscribe_depth: true
    subscribe_rgb: true
    subscribe_odom: true
    approx_sync: true
    queue_size: 10

    # QoS for image inputs. depthai_ros_driver publishes with sensor_data
    # QoS (BEST_EFFORT). rtabmap defaults to RELIABLE on these inputs and
    # would silently fail to subscribe, so override to BEST_EFFORT (=2).
    # Odom stays on the default (RELIABLE) because ekf_node publishes that
    # way. Convention: 0=SystemDefault, 1=Reliable, 2=BestEffort.
    qos_image: 2
    qos_camera_info: 2
    
    # Feature detector: GFTT + ORB for swerve rotation robustness
    Kp/DetectorStrategy: "6"
    Kp/MaxFeatures: "400"
    
    # Performance tuning for RPi4
    Mem/ImagePreDecimation: "2"
    Mem/DepthDecimation: "2"
    Rtabmap/DetectionRate: "5.0"
    
    # Geometry
    Reg/Force3DoF: "true"
    Vis/EstimationType: "1"
    # Lowered from 15 → 10. In low-texture environments (white walls,
    # terrazzo floor) RANSAC PnP regularly produces 0/15 inliers despite
    # 30-50 raw feature matches. 10 is permissive but still rejects
    # pure-coincidence matches. Verified May 2026: this lets RTAB-Map
    # publish confident loc_pose (σ ≈ 4-35 mm) on the lab map.
    Vis/MinInliers: "10"

    # Disable expensive features not needed for localization
    RGBD/ProximityBySpace: "false"
    RGBD/ProximityByTime: "false"

    # Stats publishing (useful during validation)
    Rtabmap/PublishStats: "true"

    # CRITICAL — publish the first good visual match immediately with
    # its real registration covariance. Default is 10, which makes
    # RTAB-Map cache the match and wait for a SECOND confirming one
    # before publishing /rtabmap/localization_pose. While waiting it
    # publishes a sentinel covariance (σ_x = 99.995 m, σ_yaw = 5729°)
    # that the GUI and EKF can't use — visually the LOC pill goes
    # green but the cone is anchored to wheel-odom dead-reckoning, not
    # the visual match. On a small / low-texture map the second
    # confirming match often never arrives, so localization stays
    # stuck at "publishing but useless." Setting this to 0 makes the
    # first match's covariance the published one (typically 4-35 mm σ).
    RGBD/MaxOdomCacheSize: "0"

    # Slightly relaxed loop-closure / global-relocalization threshold
    # (default ≈ 0.11). 0.08 gives the matcher a chance to latch onto
    # a weaker candidate before falling through to "no match found."
    # Combined with the GUI's 📍 Set Initial Pose hint (which seeds
    # the search with a known pose and bypasses global relocalization
    # entirely), this is what gets the lab map confidently localized.
    Rtabmap/LoopThr: "0.08"